name: Lint scripts

on:
  push:
    branches: [main]
    paths:
      - "*.sh"
      - "bash/**"
      - "zsh/**"
      - ".github/workflows/shellcheck.yml"
  pull_request:
    branches: [main]
    paths:
      - "*.sh"
      - "bash/**"
      - "zsh/**"
      - ".github/workflows/shellcheck.yml"

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: "."
          severity: style
          ignore_names: >-
            .zshrc
            .zshenv
            .zprofile
            .zlogin
            .zlogout
          ignore_paths: >-
            tmux/.config/tmux/plugins/
        env:
          SHELLCHECK_OPTS: -e SC1091
