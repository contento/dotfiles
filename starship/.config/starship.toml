[username]
style_user = "green bold"
style_root = "red bold"
format = "[$user]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = false
format = '[$ssh_symbol](bold blue) on [$hostname](bold purple) '
trim_at = "."
disabled = false

# Replace the "ÔØ»" symbol in the prompt with "ÔŞ£"
[character] # The name of the module we are configuring is "character"
success_symbol = "[ÔŞ£](bold green)" # The "success_symbol" segment is being set to "ÔŞ£" with the color "bold green"
error_symbol = "[Ô£ù](bold red)"

# ´öÂ ´ö┤
# configure directory
[directory]
read_only = " ¾░î¥"
truncation_length = 10
truncate_to_repo = true    # truncates directory to root folder if in github repo
style = "bold italic blue"

[cmd_duration]
min_time = 4
show_milliseconds = false
disabled = false
style = "bold italic red"

[aws]
symbol = "¯î¢  "

[c]
symbol = "¯İŞ "

[conda]
