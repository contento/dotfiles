# ~/.config/starship.toml
# See:
#   https://starship.rs/config/

[username]
style_user = "green bold"
style_root = "red bold"
format = "[$user]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = false
format = '[$ssh_symbol](bold blue) on [$hostname](bold purple) '
trim_at = "."
disabled = false

# Replace the "ÔØ»" symbol in the prompt with "Ô×£"
[character] # The name of the module we are configuring is "character"
success_symbol = "[Ô×£](bold green)" # The "success_symbol" segment is being set to "Ô×£" with the color "bold green"
error_symbol = "[Ô£ù](bold red)"

# ´öÂ ´ö┤
# configure directory
[directory]
read_only = " ¾░î¥"
truncation_length = 10
truncate_to_repo = false   # show full path under home, not just the repo root
home_symbol = "ÔÇª"          # signals "under $HOME" without looking like an absolute /root path
style = "bold italic blue"

[cmd_duration]
min_time = 4
show_milliseconds = false
disabled = false
style = "bold italic red"

[aws]
symbol = "¯î¢  "

