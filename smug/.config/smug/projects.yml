# Smug session configuration example
#
# Copy this file to create your own session:
#   cp default.yml.example myproject.yml
#
# Then customize the session name and root directory.
# Run the session with: smug myproject

session: myproject
root: $PROJECTS_DIR

windows:
  # Horizontal split: 60% left pane, 40% right pane
  - name: shell
    commands:
      - tmux split-window -h -p 40 -t myproject:shell
      - tmux select-pane -t myproject:shell.0

  # Example: Multi-pane window with vertical 75/25 split
  # - name: editor
  #   commands:
  #     - tmux split-window -v -p 25 -t myproject:editor
  #     - tmux select-pane -t myproject:editor.0
  #     - tmux send-keys -t myproject:editor.0 "clear" C-m

  # Example: Window with initial commands
  # - name: dev
  #   commands:
  #     - tmux send-keys -t myproject:dev "npm run dev" C-m

  # Example: Two separate windows
  # - name: editor
  # - name: build

# Available commands in the commands section:
#   - tmux split-window -v -p 25 -t SESSION:WINDOW    Split vertically (25% bottom pane)
#   - tmux split-window -h -p 25 -t SESSION:WINDOW    Split horizontally (25% right pane)
#   - tmux select-pane -t SESSION:WINDOW.PANE         Select specific pane
#   - tmux send-keys -t SESSION:WINDOW "cmd" C-m      Run command in pane
#   - tmux resize-pane -t SESSION:WINDOW.PANE -y SIZE Resize pane height
#
# Key shortcuts:
#   C-m = Enter key
#   C-c = Ctrl+C
#   C-d = Ctrl+D (EOF)

# Useful tmux keybindings (from config):
#   prefix + v = split window vertically
#   prefix + h = split window horizontally
#   prefix + C-h/j/k/l = navigate panes
#
# Session management:
#   smug list              List all sessions
#   smug myproject         Start session
#   smug myproject -a      Attach if already running
#   smug stop myproject    Kill session
#
# For more: https://github.com/ivaturi/smug
